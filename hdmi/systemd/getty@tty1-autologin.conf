# Drop-in for getty@tty1 so the HDMI console auto-logs-in (no password prompt).
# Install to: /etc/systemd/system/getty@tty1.service.d/autologin.conf
# This makes "Ctrl+C x2 -> TERMINAL" drop straight into a shell on the panel.
[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin yuiseki --noclear %I $TERM
